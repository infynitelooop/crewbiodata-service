spring.application.name=crewbiodata
server.port=8082


# Mysql Configurations
spring.datasource.url=jdbc:mysql://localhost:3306/crewbiodata
spring.datasource.username=root
spring.datasource.password=96Cse@124

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Use CHAR(36) for UUID storage instead of BINARY(16)
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# Show bound parameter values
logging.level.org.hibernate.type.descriptor.sql=TRACE


# Kafka configuration

spring.kafka.bootstrap-servers: localhost:9092
spring.kafka.consumer.group-id: crewbiodata
spring.kafka.consumer.auto-offset-reset: earliest
spring.kafka.consumer.key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.topic.name=user_topics
